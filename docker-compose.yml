version: '3.8'

services:
  db:
    image: postgres:15
    container_name: tink_invest_db
    restart: always
    environment:
      POSTGRES_DB: tink_invest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tink_invest"]
      interval: 5s
      timeout: 5s
      retries: 5

  liquibase:
    image: liquibase/liquibase:4.23
    container_name: tink_invest_migration
    volumes:
      - ./liquibase:/liquibase/changelog
    command: >
      --search-path=/liquibase/changelog
      --changelog-file=changelog/master.yaml
      --url=jdbc:postgresql://db:5432/tink_invest
      --username=postgres
      --password=postgres
      --driver=org.postgresql.Driver
      update
    depends_on:
      db:
        condition: service_healthy